<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>вљЅ Prono 2026 вЂ” Coupe du Monde</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5C842;
    --gold-dark: #C9960A;
    --green: #1A7A3C;
    --green-light: #25A355;
    --dark: #0A0F1A;
    --dark2: #111827;
    --dark3: #1C2A3A;
    --card: #162030;
    --card2: #1E2D42;
    --text: #E8EFF8;
    --muted: #6B8299;
    --red: #E84040;
    --blue: #3B82F6;
    --border: rgba(245,200,66,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content:'';
    position:fixed;
    inset:0;
    background: 
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(26,122,60,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(245,200,66,0.08) 0%, transparent 50%);
    pointer-events:none;
    z-index:0;
  }

  header {
    position:relative; z-index:10; padding: 28px 24px 20px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(10,15,26,0.8); backdrop-filter: blur(12px);
    position: sticky; top:0;
  }

  .logo { display:flex; align-items:center; gap:12px; }
  .logo-icon {
    width:44px; height:44px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-radius:12px; display:flex; align-items:center; justify-content:center;
    font-size:22px; box-shadow: 0 4px 20px rgba(245,200,66,0.3);
  }
  .logo-text { font-family:'Bebas Neue', cursive; font-size:26px; letter-spacing:2px; color:var(--gold); line-height:1; }
  .logo-sub { font-size:11px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; }

  #user-badge { display:none; align-items:center; gap:8px; background: var(--card2); border:1px solid var(--border); border-radius:30px; padding:8px 16px; font-size:14px; font-weight:500; }
  #user-badge .avatar { width:28px; height:28px; background: linear-gradient(135deg, var(--green-light), var(--gold)); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--dark); }

  .nav-tabs { display:flex; gap:4px; padding:0 24px; background: rgba(10,15,26,0.6); border-bottom: 1px solid var(--border); overflow-x:auto; scrollbar-width:none; position:sticky; top:85px; z-index:9; backdrop-filter:blur(12px); }
  .nav-tabs::-webkit-scrollbar { display:none; }
  .tab-btn { padding:14px 20px; background:none; border:none; color:var(--muted); font-family:'Outfit',sans-serif; font-size:13px; font-weight:500; cursor:pointer; white-space:nowrap; border-bottom:2px solid transparent; transition:all 0.2s; letter-spacing:0.5px; text-transform:uppercase; }
  .tab-btn.active { color:var(--gold); border-bottom-color:var(--gold); }

  main { position:relative; z-index:1; max-width:960px; margin:0 auto; padding:32px 20px 80px; }
  .page { display:none; }
  .page.active { display:block; }

  .section-title { font-family:'Bebas Neue', cursive; font-size:36px; letter-spacing:3px; color:var(--gold); margin-bottom:6px; }
  .section-sub { color:var(--muted); font-size:14px; margin-bottom:28px; }

  /* Login */
  #page-login { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:70vh; text-align:center; }
  .login-card { background: var(--card); border:1px solid var(--border); border-radius:20px; padding:36px; width:100%; max-width:400px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .field-group { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; text-align:left; }
  .field-group label { font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  input[type=text], input[type=password], input[type=number], select { background: var(--dark3); border: 1px solid rgba(255,255,255,0.08); border-radius:10px; padding:12px 16px; color:var(--text); font-family:'Outfit',sans-serif; font-size:15px; outline:none; transition:border-color 0.2s; width:100%; }
  
  .btn { padding:12px 24px; border:none; border-radius:10px; font-family:'Outfit',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; letter-spacing:0.5px; }
  .btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color:var(--dark); box-shadow: 0 4px 20px rgba(245,200,66,0.3); }
  .btn-full { width:100%; }
  .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text); }

  /* Matches */
  .round-title { font-family:'Bebas Neue', cursive; font-size:22px; letter-spacing:2px; color:var(--gold); margin: 28px 0 12px; display:flex; align-items:center; gap:10px; }
  .round-title::after { content:''; flex:1; height:1px; background: linear-gradient(to right, var(--border), transparent); }
  .match-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px 20px; display:grid; grid-template-columns: 1fr auto 1fr; align-items:center; gap:12px; margin-bottom:10px; }
  .team-side { display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center; }
  .team-flag { font-size:32px; line-height:1; }
  .team-name { font-size:12px; font-weight:600; color:var(--text); letter-spacing:0.5px; text-transform:uppercase; }
  .score-input { width:48px !important; text-align:center; font-size:20px !important; font-weight:700 !important; padding:8px 4px !important; }

  /* Board */
  .scoreboard { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
  .sb-row { display:grid; grid-template-columns: 40px 1fr 80px; padding:14px 20px; border-top:1px solid rgba(255,255,255,0.04); align-items:center; }
  .rank { font-weight:700; color:var(--gold); }

  .toast-container { position:fixed; bottom:24px; right:24px; z-index:999; display:flex; flex-direction:column; gap:8px; }
  .toast { background:var(--card2); border:1px solid var(--border); border-radius:12px; padding:12px 18px; font-size:14px; box-shadow:0 8px 30px rgba(0,0,0,0.4); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">вљЅ</div>
    <div>
      <div class="logo-text">Prono 2026</div>
      <div class="logo-sub">Coupe du Monde</div>
    </div>
  </div>
  <div id="user-badge">
    <div class="avatar" id="user-avatar">?</div>
    <span id="user-name-display"></span>
  </div>
</header>

<nav class="nav-tabs" id="main-nav" style="display:none">
  <button class="tab-btn active" onclick="showTab('pronos')">рџЋЇ Mes Pronos</button>
  <button class="tab-btn" onclick="showTab('classement')">рџЏ† Classement</button>
  <button class="tab-btn" onclick="showTab('admin')">вљ™пёЏ Admin</button>
</nav>

<main>
  <div class="page active" id="page-login">
    <div class="login-card">
      <div class="section-title">Connexion</div>
      <div id="login-select">
        <div class="field-group">
          <label>Profil</label>
          <select id="select-player" onchange="onSelectPlayer()"><option value="">вЂ” Choisir вЂ”</option></select>
        </div>
        <div class="field-group">
          <label>PIN (4 chiffres)</label>
          <input type="password" id="input-login-pin" maxlength="4" placeholder="вЂўвЂўвЂўвЂў">
        </div>
        <button class="btn btn-gold btn-full" onclick="loginExisting()" style="margin-bottom:12px">Entrer вњ“</button>
        <button class="btn btn-outline btn-full" onclick="toggleRegister()">Nouveau Profil +</button>
      </div>
      <div id="login-register" style="display:none">
        <div class="field-group"><label>PrГ©nom Nom</label><input type="text" id="input-name"></div>
        <div class="field-group"><label>PIN (4 chiffres)</label><input type="password" id="input-pin" maxlength="4"></div>
        <button class="btn btn-gold btn-full" onclick="registerPlayer()" style="margin-bottom:12px">CrГ©er Profil в†’</button>
        <button class="btn btn-outline btn-full" onclick="toggleRegister()">Retour</button>
      </div>
    </div>
  </div>

  <div class="page" id="page-pronos">
    <div class="section-title">MES PRONOS</div>
    <div id="pronos-container"></div>
    <button class="btn btn-gold btn-full" onclick="saveAllPronos()" style="margin-top:20px; padding:18px">рџ’ѕ Sauvegarder tout</button>
  </div>

  <div class="page" id="page-classement">
    <div class="section-title">CLASSEMENT</div>
    <div class="scoreboard" id="ranking-list"></div>
  </div>

  <div class="page" id="page-admin">
    <div id="admin-lock">
        <div class="field-group"><label>Mot de passe admin</label><input type="password" id="admin-pwd-input"></div>
        <button class="btn btn-gold" onclick="checkAdminPwd()">AccГ©der</button>
    </div>
    <div id="admin-content" style="display:none">
        <div class="section-title">RESULTATS REELS</div>
        <div id="admin-container"></div>
    </div>
  </div>
</main>

<div class="toast-container" id="toast-container"></div>

<script>
// ==========================================
// DATA - TES GROUPES EXACTS
// ==========================================
const GROUPS = {
  A: { teams: [{n: "Mexique", f: "рџ‡Ірџ‡Ѕ"}, {n: "Afrique du Sud", f: "рџ‡їрџ‡¦"}, {n: "CorГ©e du Sud", f: "рџ‡°рџ‡·"}, {n: "Inconnu 1 (Eur. D)", f: "рџЏіпёЏ"}] },
  B: { teams: [{n: "Canada", f: "рџ‡Ёрџ‡¦"}, {n: "Inconnu 2 (Eur. A)", f: "рџЏіпёЏ"}, {n: "Qatar", f: "рџ‡¶рџ‡¦"}, {n: "Suisse", f: "рџ‡Ёрџ‡­"}] },
  C: { teams: [{n: "BrГ©sil", f: "рџ‡§рџ‡·"}, {n: "Maroc", f: "рџ‡Ірџ‡¦"}, {n: "HaГЇti", f: "рџ‡­рџ‡№"}, {n: "Ecosse", f: "рџЏґу Ѓ§у Ѓўу Ѓіу ЃЈу Ѓґу Ѓї"}] },
  D: { teams: [{n: "USA", f: "рџ‡єрџ‡ё"}, {n: "Paraguay", f: "рџ‡µрџ‡ѕ"}, {n: "Australie", f: "рџ‡¦рџ‡є"}, {n: "Inconnu 3 (Eur. C)", f: "рџЏіпёЏ"}] },
  E: { teams: [{n: "Allemagne", f: "рџ‡©рџ‡Є"}, {n: "CuraГ§ao", f: "рџ‡Ёрџ‡ј"}, {n: "CГґte d'Ivoire", f: "рџ‡Ёрџ‡®"}, {n: "Equateur", f: "рџ‡Єрџ‡Ё"}] },
  F: { teams: [{n: "Pays-Bas", f: "рџ‡ірџ‡±"}, {n: "Japon", f: "рџ‡Їрџ‡µ"}, {n: "Inconnu 4 (Eur. B)", f: "рџЏіпёЏ"}, {n: "Tunisie", f: "рџ‡№рџ‡і"}] },
  G: { teams: [{n: "Belgique", f: "рџ‡§рџ‡Є"}, {n: "Egypte", f: "рџ‡Єрџ‡¬"}, {n: "Iran", f: "рџ‡®рџ‡·"}, {n: "N-ZГ©lande", f: "рџ‡ірџ‡ї"}] },
  H: { teams: [{n: "Espagne", f: "рџ‡Єрџ‡ё"}, {n: "Cap-Vert", f: "рџ‡Ёрџ‡»"}, {n: "Arabie Saoudite", f: "рџ‡ёрџ‡¦"}, {n: "Uruguay", f: "рџ‡єрџ‡ѕ"}] },
  I: { teams: [{n: "France", f: "рџ‡«рџ‡·"}, {n: "SГ©nГ©gal", f: "рџ‡ёрџ‡і"}, {n: "Inconnu 5 (Inter. 2)", f: "рџЏіпёЏ"}, {n: "NorvГЁge", f: "рџ‡ірџ‡ґ"}] },
  J: { teams: [{n: "Argentine", f: "рџ‡¦рџ‡·"}, {n: "AlgГ©rie", f: "рџ‡©рџ‡ї"}, {n: "Autriche", f: "рџ‡¦рџ‡№"}, {n: "Jordanie", f: "рџ‡Їрџ‡ґ"}] },
  K: { teams: [{n: "Portugal", f: "рџ‡µрџ‡№"}, {n: "Inconnu 6 (Inter. 1)", f: "рџЏіпёЏ"}, {n: "OuzbГ©kistan", f: "рџ‡єрџ‡ї"}, {n: "Colombie", f: "рџ‡Ёрџ‡ґ"}] },
  L: { teams: [{n: "Angleterre", f: "рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї"}, {n: "Croatie", f: "рџ‡­рџ‡·"}, {n: "Ghana", f: "рџ‡¬рџ‡­"}, {n: "Panama", f: "рџ‡µрџ‡¦"}] }
};

// Generation des matchs basГ©e sur tes groupes
function generateMatches() {
  const matches = [];
  let id = 1;
  Object.entries(GROUPS).forEach(([grp, {teams}]) => {
    // Chaque groupe fait 2 matchs simulГ©s pour l'interface (1vs2 et 3vs4)
    matches.push({id: 'g'+id++, round: 'Groupe '+grp, home: teams[0], away: teams[1]});
    matches.push({id: 'g'+id++, round: 'Groupe '+grp, home: teams[2], away: teams[3]});
  });
  return matches;
}

const ALL_MATCHES = generateMatches();

// ==========================================
// LOGIQUE APP (DB & UI)
// ==========================================
let state = {
  user: null,
  players: [],
  pronos: {},
  results: {}
};

// Sauvegarde dans LocalStorage (plus simple pour GitHub Pages)
function dbSave() {
  localStorage.setItem('prono2026_data', JSON.stringify({
    players: state.players,
    pronos: state.pronos,
    results: state.results
  }));
}

function dbLoad() {
  const data = JSON.parse(localStorage.getItem('prono2026_data') || '{}');
  state.players = data.players || [];
  state.pronos = data.pronos || {};
  state.results = data.results || {};
  refreshPlayerSelect();
}

function refreshPlayerSelect() {
  const sel = document.getElementById('select-player');
  sel.innerHTML = '<option value="">вЂ” Choisir вЂ”</option>';
  state.players.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.name;
    opt.textContent = p.name;
    sel.appendChild(opt);
  });
}

function toggleRegister() {
  const s = document.getElementById('login-select');
  const r = document.getElementById('login-register');
  s.style.display = s.style.display === 'none' ? 'block' : 'none';
  r.style.display = r.style.display === 'none' ? 'block' : 'none';
}

function registerPlayer() {
  const name = document.getElementById('input-name').value.trim();
  const pin = document.getElementById('input-pin').value;
  if(!name || pin.length < 4) return showToast("Nom et PIN requis (4 chiffres)", "error");
  state.players.push({name, pin});
  dbSave();
  showToast("Compte crГ©Г© !", "success");
  toggleRegister();
  refreshPlayerSelect();
}

function loginExisting() {
  const name = document.getElementById('select-player').value;
  const pin = document.getElementById('input-login-pin').value;
  const p = state.players.find(x => x.name === name && x.pin === pin);
  if(p) {
    state.user = name;
    document.getElementById('page-login').classList.remove('active');
    document.getElementById('main-nav').style.display = 'flex';
    document.getElementById('user-badge').style.display = 'flex';
    document.getElementById('user-name-display').textContent = name;
    showTab('pronos');
    renderPronos();
  } else {
    showToast("PIN incorrect", "error");
  }
}

function showTab(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.querySelector(`[onclick="showTab('${id}')"]`).classList.add('active');
  if(id === 'classement') renderRanking();
  if(id === 'admin') renderAdmin();
}

function renderPronos() {
  const container = document.getElementById('pronos-container');
  container.innerHTML = '';
  let currentRound = '';
  
  const userPronos = state.pronos[state.user] || {};

  ALL_MATCHES.forEach(m => {
    if(m.round !== currentRound) {
      currentRound = m.round;
      container.innerHTML += `<div class="round-title">${currentRound}</div>`;
    }
    const s1 = userPronos[m.id]?.s1 ?? "";
    const s2 = userPronos[m.id]?.s2 ?? "";
    
    container.innerHTML += `
      <div class="match-card">
        <div class="team-side"><span class="team-flag">${m.home.f}</span><span class="team-name">${m.home.n}</span></div>
        <div style="display:flex; gap:8px; align-items:center">
          <input type="number" class="score-input" id="p1_${m.id}" value="${s1}">
          <span style="color:var(--muted)">VS</span>
          <input type="number" class="score-input" id="p2_${m.id}" value="${s2}">
        </div>
        <div class="team-side"><span class="team-flag">${m.away.f}</span><span class="team-name">${m.away.n}</span></div>
      </div>
    `;
  });
}

function saveAllPronos() {
  if(!state.pronos[state.user]) state.pronos[state.user] = {};
  ALL_MATCHES.forEach(m => {
    const s1 = document.getElementById(`p1_${m.id}`).value;
    const s2 = document.getElementById(`p2_${m.id}`).value;
    if(s1 !== "" && s2 !== "") {
      state.pronos[state.user][m.id] = {s1: parseInt(s1), s2: parseInt(s2)};
    }
  });
  dbSave();
  showToast("Pronostics enregistrГ©s !", "success");
}

function renderRanking() {
  const list = document.getElementById('ranking-list');
  let scores = state.players.map(p => {
    let pts = 0;
    const pPronos = state.pronos[p.name] || {};
    Object.keys(state.results).forEach(mid => {
      const res = state.results[mid];
      const pro = pPronos[mid];
      if(res && pro && res.s1 !== null && pro.s1 !== null) {
        if(res.s1 === pro.s1 && res.s2 === pro.s2) pts += 5; // Exact
        else if(Math.sign(res.s1 - res.s2) === Math.sign(pro.s1 - pro.s2)) pts += 2; // Gagnant
      }
    });
    return {name: p.name, pts};
  });
  
  scores.sort((a,b) => b.pts - a.pts);
  list.innerHTML = scores.map((s, i) => `
    <div class="sb-row">
      <div class="rank">#${i+1}</div>
      <div style="font-weight:600">${s.name}</div>
      <div style="text-align:right; color:var(--gold); font-weight:700">${s.pts} pts</div>
    </div>
  `).join('');
}

function checkAdminPwd() {
  if(document.getElementById('admin-pwd-input').value === '2026') {
    document.getElementById('admin-lock').style.display = 'none';
    document.getElementById('admin-content').style.display = 'block';
    renderAdmin();
  }
}

function renderAdmin() {
  const container = document.getElementById('admin-container');
  container.innerHTML = '';
  ALL_MATCHES.forEach(m => {
    const res = state.results[m.id] || {s1:"", s2:""};
    container.innerHTML += `
      <div class="match-card" style="border-color:var(--blue)">
        <div class="team-side"><span>${m.home.n}</span></div>
        <div style="display:flex; gap:5px">
          <input type="number" class="score-input" value="${res.s1}" onchange="updateResult('${m.id}', 1, this.value)">
          <input type="number" class="score-input" value="${res.s2}" onchange="updateResult('${m.id}', 2, this.value)">
        </div>
        <div class="team-side"><span>${m.away.n}</span></div>
      </div>
    `;
  });
}

function updateResult(mid, side, val) {
  if(!state.results[mid]) state.results[mid] = {s1:null, s2:null};
  state.results[mid]['s'+side] = val === "" ? null : parseInt(val);
  dbSave();
}

function showToast(msg, type) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.borderLeft = type === 'success' ? '4px solid var(--green-light)' : '4px solid var(--red)';
  t.innerHTML = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

window.onload = dbLoad;
</script>
</body>
</html>
