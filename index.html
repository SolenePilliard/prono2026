<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Prono 2026 — Coupe du Monde</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5C842; --gold-dark: #C9960A; --green: #1A7A3C; --green-light: #25A355;
    --dark: #0A0F1A; --dark2: #111827; --dark3: #1C2A3A; --card: #162030;
    --card2: #1E2D42; --text: #E8EFF8; --muted: #6B8299; --red: #E84040;
    --blue: #3B82F6; --border: rgba(245,200,66,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Outfit', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; }
  header { padding: 20px; display:flex; align-items:center; justify-content:space-between; border-bottom: 1px solid var(--border); background: rgba(10,15,26,0.8); backdrop-filter: blur(12px); sticky; top:0; z-index:100; }
  .logo-text { font-family:'Bebas Neue', cursive; font-size:26px; color:var(--gold); }
  .nav-tabs { display:flex; gap:10px; padding:10px 20px; background: var(--dark2); border-bottom: 1px solid var(--border); overflow-x:auto; }
  .tab-btn { padding:10px; background:none; border:none; color:var(--muted); cursor:pointer; font-weight:600; }
  .tab-btn.active { color:var(--gold); border-bottom: 2px solid var(--gold); }
  main { max-width:900px; margin:0 auto; padding:20px; }
  .page { display:none; } .page.active { display:block; }
  .login-card { background: var(--card); border:1px solid var(--border); border-radius:15px; padding:30px; max-width:400px; margin: 50px auto; }
  .field-group { margin-bottom:15px; display:flex; flex-direction:column; gap:5px; }
  input, select { background: var(--dark3); border:1px solid var(--border); padding:10px; color:white; border-radius:8px; }
  .btn { padding:12px; border:none; border-radius:8px; cursor:pointer; font-weight:700; width:100%; margin-top:10px; }
  .btn-gold { background: var(--gold); color: var(--dark); }
  .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
  .match-card { background: var(--card); padding:15px; border-radius:12px; margin-bottom:10px; display:grid; grid-template-columns: 1fr auto 1fr; align-items:center; border: 1px solid var(--border); }
  .score-input { width:40px; text-align:center; font-weight:bold; }
  .toast { position:fixed; bottom:20px; right:20px; background: var(--card2); border:1px solid var(--gold); padding:15px; border-radius:8px; z-index:1000; }
</style>
</head>
<body>

<header>
  <div class="logo-text">⚽ PRONO 2026</div>
  <div id="user-display" style="display:none">👤 <span id="current-user-name"></span></div>
</header>

<nav class="nav-tabs" id="main-nav" style="display:none">
  <button class="tab-btn active" onclick="showTab('pronos')">🎯 Mes Pronos</button>
  <button class="tab-btn" onclick="showTab('classement')">🏆 Classement</button>
  <button class="tab-btn" onclick="showTab('admin')">⚙️ Admin</button>
</nav>

<main>
  <div class="page active" id="page-login">
    <div class="login-card">
      <h2 style="margin-bottom:20px">Bienvenue</h2>
      <div id="login-select">
        <div class="field-group">
          <label>Profil existant</label>
          <select id="select-player"><option value="">-- Choisir --</option></select>
        </div>
        <button class="btn btn-gold" onclick="login()">Se connecter</button>
        <p style="text-align:center; margin:15px 0; color:var(--muted)">ou</p>
        <button class="btn btn-outline" onclick="toggleRegister(true)">Créer un compte</button>
      </div>

      <div id="login-register" style="display:none">
        <div class="field-group">
          <label>Votre Nom / Pseudo</label>
          <input type="text" id="reg-name" placeholder="Ex: Jean">
        </div>
        <button class="btn btn-gold" onclick="register()">Valider l'inscription</button>
        <button class="btn btn-outline" onclick="toggleRegister(false)">Retour</button>
      </div>
    </div>
  </div>

  <div class="page" id="page-pronos">
    <h2>🎯 Mes Pronostics</h2>
    <div id="matches-container"></div>
    <button class="btn btn-gold" onclick="savePronos()" style="margin-top:20px">💾 Sauvegarder tout</button>
  </div>

  <div class="page" id="page-classement">
    <h2>🏆 Classement Général</h2>
    <div id="leaderboard-content"></div>
  </div>

  <div class="page" id="page-admin">
    <h2>⚙️ Administration</h2>
    <div class="field-group">
      <label>Saisir les scores réels</label>
      <div id="admin-matches"></div>
    </div>
    <button class="btn btn-outline" onclick="resetApp()" style="color:red; border-color:red">Réinitialiser l'App</button>
  </div>
</main>
