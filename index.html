<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Prono 2026 — Coupe du Monde</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5C842;
    --gold-dark: #C9960A;
    --green: #1A7A3C;
    --green-light: #25A355;
    --dark: #0A0F1A;
    --dark2: #111827;
    --dark3: #1C2A3A;
    --card: #162030;
    --card2: #1E2D42;
    --text: #E8EFF8;
    --muted: #6B8299;
    --red: #E84040;
    --blue: #3B82F6;
    --border: rgba(245,200,66,0.15);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content:'';
    position:fixed;
    inset:0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(26,122,60,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(245,200,66,0.08) 0%, transparent 50%);
    pointer-events:none;
    z-index:0;
  }

  /* ---- HEADER ---- */
  header {
    position:relative;
    z-index:10;
    padding: 28px 24px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(10,15,26,0.8);
    backdrop-filter: blur(12px);
    position: sticky;
    top:0;
  }

  .logo {
    display:flex;
    align-items:center;
    gap:12px;
  }

  .logo-icon {
    width:44px; height:44px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    box-shadow: 0 4px 20px rgba(245,200,66,0.3);
  }

  .logo-text {
    font-family:'Bebas Neue', cursive;
    font-size:26px;
    letter-spacing:2px;
    color:var(--gold);
    line-height:1;
  }

  .logo-sub {
    font-size:11px;
    color:var(--muted);
    letter-spacing:3px;
    text-transform:uppercase;
  }

  .header-right {
    display:flex;
    align-items:center;
    gap:12px;
  }

  #user-badge {
    display:none;
    align-items:center;
    gap:8px;
    background: var(--card2);
    border:1px solid var(--border);
    border-radius:30px;
    padding:8px 16px;
    font-size:14px;
    font-weight:500;
  }

  #user-badge .avatar {
    width:28px; height:28px;
    background: linear-gradient(135deg, var(--green-light), var(--gold));
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:700;
    color:var(--dark);
  }

  /* ---- NAV TABS ---- */
  .nav-tabs {
    display:flex;
    gap:4px;
    padding:0 24px;
    background: rgba(10,15,26,0.6);
    border-bottom: 1px solid var(--border);
    overflow-x:auto;
    scrollbar-width:none;
    position:sticky;
    top:85px;
    z-index:9;
    backdrop-filter:blur(12px);
  }

  .nav-tabs::-webkit-scrollbar { display:none; }

  .tab-btn {
    padding:14px 20px;
    background:none;
    border:none;
    color:var(--muted);
    font-family:'Outfit',sans-serif;
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    white-space:nowrap;
    border-bottom:2px solid transparent;
    transition:all 0.2s;
    letter-spacing:0.5px;
    text-transform:uppercase;
  }

  .tab-btn:hover { color:var(--text); }
  .tab-btn.active {
    color:var(--gold);
    border-bottom-color:var(--gold);
  }

  /* ---- MAIN CONTENT ---- */
  main {
    position:relative;
    z-index:1;
    max-width:960px;
    margin:0 auto;
    padding:32px 20px 80px;
  }

  .page { display:none; }
  .page.active { display:block; }

  /* ---- SECTION TITLES ---- */
  .section-title {
    font-family:'Bebas Neue', cursive;
    font-size:36px;
    letter-spacing:3px;
    color:var(--gold);
    margin-bottom:6px;
  }

  .section-sub {
    color:var(--muted);
    font-size:14px;
    margin-bottom:28px;
  }

  /* ---- LOGIN PAGE ---- */
  #page-login {
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:70vh;
    text-align:center;
  }
