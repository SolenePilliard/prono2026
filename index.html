<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronostics Coupe du Monde 2026</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; color: #333; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #004a99; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .group-card { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-top: 5px solid #004a99; }
        .group-title { font-size: 1.4em; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 5px; color: #d32f2f; }
        .team { display: flex; align-items: center; margin-bottom: 10px; padding: 5px; border-radius: 5px; transition: background 0.2s; }
        .team:hover { background-color: #f0f7ff; }
        .flag { font-size: 1.5em; margin-right: 15px; width: 30px; text-align: center; }
        .team-name { font-size: 1.1em; }
        .unknown { color: #888; font-style: italic; }
    </style>
</head>
<body>

    <h1>🏆 Pronostics Coupe du Monde FIFA 2026</h1>

    <div class="container" id="groups-container">
        </div>

    <script>
        const groupsData = [
            { id: "A", teams: [{n: "Mexique", f: "🇲🇽"}, {n: "Afrique du Sud", f: "🇿🇦"}, {n: "Corée du Sud", f: "🇰🇷"}, {n: "Inconnu 1 (Barrage D)", f: "🏳️"}] },
            { id: "B", teams: [{n: "Canada", f: "🇨🇦"}, {n: "Suisse", f: "🇨🇭"}, {n: "Qatar", f: "🇶🇦"}, {n: "Inconnu 2 (Barrage A)", f: "🏳️"}] },
            { id: "C", teams: [{n: "Brésil", f: "🇧🇷"}, {n: "Maroc", f: "🇲🇦"}, {n: "Haïti", f: "🇭🇹"}, {n: "Écosse", f: "🏴󠁧󠁢󠁳󠁣󠁴󠁿"}] },
            { id: "D", teams: [{n: "États-Unis", f: "🇺🇸"}, {n: "Australie", f: "🇦🇺"}, {n: "Paraguay", f: "🇵🇾"}, {n: "Inconnu 3 (Barrage C)", f: "🏳️"}] },
            { id: "E", teams: [{n: "Allemagne", f: "🇩🇪"}, {n: "Équateur", f: "🇪🇨"}, {n: "Côte d'Ivoire", f: "🇨🇮"}, {n: "Curaçao", f: "🇨🇼"}] },
            { id: "F", teams: [{n: "Pays-Bas", f: "🇳🇱"}, {n: "Japon", f: "🇯🇵"}, {n: "Tunisie", f: "🇹🇳"}, {n: "Inconnu 4 (Barrage B)", f: "🏳️"}] },
            { id: "G", teams: [{n: "Belgique", f: "🇧🇪"}, {n: "Iran", f: "🇮🇷"}, {n: "Égypte", f: "🇪🇬"}, {n: "Nouvelle-Zélande", f: "🇳🇿"}] },
            { id: "H", teams: [{n: "Espagne", f: "🇪🇸"}, {n: "Uruguay", f: "🇺🇾"}, {n: "Arabie Saoudite", f: "🇸🇦"}, {n: "Cap-Vert", f: "🇨🇻"}] },
            { id: "I", teams: [{n: "France", f: "🇫🇷"}, {n: "Sénégal", f: "🇸🇳"}, {n: "Norvège", f: "🇳🇴"}, {n: "Inconnu 5 (Barrage Inter. 2)", f: "🏳️"}] },
            { id: "J", teams: [{n: "Argentine", f: "🇦🇷"}, {n: "Autriche", f: "🇦🇹"}, {n: "Algérie", f: "🇩🇿"}, {n: "Jordanie", f: "🇯🇴"}] },
            { id: "K", teams: [{n: "Portugal", f: "🇵🇹"}, {n: "Colombie", f: "🇨🇴"}, {n: "Ouzbékistan", f: "🇺🇿"}, {n: "Inconnu 6 (Barrage Inter. 1)", f: "🏳️"}] },
            { id: "L", teams: [{n: "Angleterre", f: "🏴󠁧󠁢󠁥󠁮󠁧󠁿"}, {n: "Croatie", f: "🇭🇷"}, {n: "Panama", f: "🇵🇦"}, {n: "Ghana", f: "🇬🇭"}] }
        ];

        const container = document.getElementById('groups-container');

        groupsData.forEach(group => {
            let groupHTML = `
                <div class="group-card">
                    <div class="group-title">Groupe ${group.id}</div>
            `;
            
            group.teams.forEach(team => {
                const isUnknown = team.f === "🏳️";
                groupHTML += `
                    <div class="team">
                        <span class="flag">${team.f}</span>
                        <span class="team-name ${isUnknown ? 'unknown' : ''}">${team.n}</span>
                    </div>
                `;
            });

            groupHTML += `</div>`;
            container.innerHTML += groupHTML;
        });
    </script>
</body>
</html>
